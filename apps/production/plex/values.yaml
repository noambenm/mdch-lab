ingress:
  enabled: false
  url: ""

service:
  type: LoadBalancer
  port: 32400
  loadBalancerIP: 10.10.10.21

affinity:
  nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: kubernetes.io/hostname
            operator: In
            values:
            - raspberrypi

extraEnv:
  ADVERTISE_IP: "http://10.10.10.21:32400,https://plex.mdch-lab.dev:443"
  TZ: "Asia/Jerusalem"
  PLEX_CLAIM: "claim-brG3Q3rBYEwp5zX1Qryx"

extraVolumeMounts:
  - name: plex-media
    mountPath: /plex
    readOnly: false

extraVolumes:
  - name: plex-media
    nfs:
      server: 192.168.2.98
      path: /nfs/Plex
      readOnly: false
